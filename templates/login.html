<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --cream: #FAF7F2;
      --ink: #1A1814;
      --gold: #C9A84C;
      --gold-light: #E8D5A3;
      --muted: #8A8070;
      --border: #E2DDD5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 56px 52px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 40px rgba(26,24,20,0.06);
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      display: block;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
      background: #fff;
    }
    input::placeholder { color: #C4BDB2; }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      color: var(--gold-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    button[type="submit"]:hover { background: #2D2A24; }
    hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
    .note { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome</h1>
    <p class="subtitle">Enter your details to start your session.</p>
    <form method="POST" action="/">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="given-name"/>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email"/>
      <button type="submit">Start →</button>
    </form>
    <hr/>
    <p class="note">Your session is private. Conversations are not shared.</p>
  </div>
</body>
</html>
